<?xml version="1.0"?>
<?xml-stylesheet href="chrome://global/skin/" type="text/css"?>
<window
  id="llmforzotero-mineru-manager"
  title="Manage MinerU Files"
  width="860"
  height="560"
  onload="if (window.arguments &amp;&amp; window.arguments[0] &amp;&amp; window.arguments[0].onLoad) { window.arguments[0].onLoad(this); }"
  xmlns="http://www.mozilla.org/keymaster/gatekeeper/there.is.only.xul"
  xmlns:html="http://www.w3.org/1999/xhtml"
>
  <html:div id="llmforzotero-mineru-mgr-root" style="
    display: flex;
    flex-direction: column;
    height: 100%;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    font-size: 13px;
    color: FieldText;
    background: Field;
  ">
    <!-- Top bar -->
    <html:div style="padding: 12px 16px 10px; border-bottom: 1px solid rgba(128,128,128,0.2);">
      <html:div style="display: flex; align-items: center; gap: 10px; margin-bottom: 8px;">
        <html:span style="font-size: 15px; font-weight: 700; flex: 0 0 auto;">Manage MinerU Files</html:span>
        <html:progress
          id="llmforzotero-mineru-mgr-progress"
          value="0" max="100"
          style="flex: 1; height: 6px; min-width: 80px;"
        ></html:progress>
        <html:span
          id="llmforzotero-mineru-mgr-progress-label"
          style="font-size: 11.5px; white-space: nowrap; color: #888;"
        >0 / 0</html:span>
      </html:div>
      <html:div style="display: flex; align-items: center; gap: 8px; flex-wrap: wrap;">
        <html:button id="llmforzotero-mineru-mgr-start-btn" type="button" style="
          padding: 4px 12px; font-size: 11.5px; font-weight: 600;
          border: 1px solid var(--color-accent, #2563eb); border-radius: 4px;
          background: var(--color-accent, #2563eb); color: #fff; cursor: pointer;
        ">Start All</html:button>
        <html:button id="llmforzotero-mineru-mgr-delete-btn" type="button" style="
          padding: 4px 12px; font-size: 11.5px; font-weight: 500;
          border: 1px solid #dc2626; border-radius: 4px;
          background: transparent; color: #dc2626; cursor: pointer;
        ">Delete All Cache</html:button>
        <html:span id="llmforzotero-mineru-mgr-error"
          style="font-size: 11px; color: #dc2626; display: none; margin-left: 4px;"
        ></html:span>
      </html:div>
    </html:div>

    <!-- Two-panel body -->
    <html:div style="flex: 1; display: flex; min-height: 0;">
      <!-- Left sidebar -->
      <html:div id="llmforzotero-mineru-mgr-sidebar" style="
        width: 210px; min-width: 160px; max-width: 300px;
        border-right: 1px solid rgba(128,128,128,0.2);
        overflow-y: auto; padding: 6px 0; flex-shrink: 0;
      "></html:div>

      <!-- Right panel -->
      <html:div style="flex: 1; display: flex; flex-direction: column; min-width: 0;">
        <!-- Column headers (clickable for sorting) -->
        <html:div id="llmforzotero-mineru-mgr-col-headers" style="
          display: flex; align-items: center; gap: 8px;
          padding: 4px 10px;
          font-size: 10.5px; font-weight: 600; color: #888;
          border-bottom: 1px solid rgba(128,128,128,0.2);
          flex-shrink: 0; user-select: none;
        ">
          <html:span data-sort-key="cached" style="width: 8px; cursor: pointer; text-align: center; flex-shrink: 0;">&#x25CF;</html:span>
          <html:span data-sort-key="title" style="flex: 1; min-width: 0; cursor: pointer;">Title</html:span>
          <html:span data-sort-key="firstCreator" style="flex: 0 0 110px; cursor: pointer;">Author</html:span>
          <html:span data-sort-key="year" style="flex: 0 0 40px; text-align: right; cursor: pointer;">Year</html:span>
          <html:span data-sort-key="dateAdded" style="flex: 0 0 72px; text-align: right; cursor: pointer;">Added</html:span>
        </html:div>
        <!-- Scrollable items -->
        <html:div id="llmforzotero-mineru-mgr-items-list" style="
          flex: 1; overflow-y: auto; min-height: 0;
        "></html:div>
      </html:div>
    </html:div>

    <!-- Context menu -->
    <html:div id="llmforzotero-mineru-mgr-context-menu" style="
      display: none; position: fixed;
      background: Field; border: 1px solid rgba(128,128,128,0.3);
      border-radius: 6px; box-shadow: 0 2px 8px rgba(0,0,0,0.18);
      padding: 4px 0; z-index: 999; min-width: 180px;
    ">
      <html:div id="llmforzotero-mineru-mgr-ctx-process" style="padding: 5px 14px; font-size: 12px; cursor: pointer;">
        Process This Item
      </html:div>
      <html:div id="llmforzotero-mineru-mgr-ctx-show-folder" style="padding: 5px 14px; font-size: 12px; cursor: pointer;">
        Show in File Manager
      </html:div>
      <html:div style="border-top: 1px solid rgba(128,128,128,0.2); margin: 2px 0;"></html:div>
      <html:div id="llmforzotero-mineru-mgr-ctx-delete" style="padding: 5px 14px; font-size: 12px; cursor: pointer; color: #dc2626;">
        Delete MinerU Cache
      </html:div>
    </html:div>
  </html:div>
</window>
